<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conductor Macro Editor</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <h1>Conductor Macro Editor</h1>
    <div id="auth-area">
      <button id="btn-login" class="btn-primary">Login with GitHub</button>
    </div>
    <div id="user-area" style="display:none">
      <img id="user-avatar" class="user-avatar" src="" alt="">
      <span id="user-name" class="user-name"></span>
      <button id="btn-logout" class="btn-link">Logout</button>
    </div>
    <select id="repo-select" disabled>
      <option>Select repo...</option>
    </select>
    <select id="branch-select" disabled>
      <option>Select branch...</option>
    </select>
    <button id="btn-fetch" disabled>Fetch</button>
    <span id="status" class="status"></span>
    <button id="btn-pat-toggle" class="btn-link" title="Use PAT instead">PAT</button>
    <span class="version">v0.2.4</span>

  <div class="modal" id="device-flow-modal">
    <div class="device-flow-content">
      <h3>Login with GitHub</h3>
      <p>Open the link below and enter this code:</p>
      <div id="device-code" class="device-code"></div>
      <a id="device-link" href="" target="_blank" class="btn-primary device-link">Open GitHub</a>
      <p class="device-waiting" id="device-waiting">Waiting for authorization...</p>
      <button class="btn-close" id="device-cancel">&times;</button>
    </div>
  </div>

  <div class="modal" id="pat-modal">
    <div class="pat-content">
      <h3>Connect with PAT</h3>
      <input type="password" id="token-input" placeholder="GitHub Personal Access Token">
      <button id="btn-auth" class="btn-primary">Connect</button>
      <button class="btn-close" id="pat-cancel">&times;</button>
    </div>
  </div>
  </header>

  <div class="main">
    <div class="panel panel-resizable" id="macro-list">
      <div class="empty-msg">Connect to GitHub and fetch a keymap</div>
    </div>

    <div class="panel" id="macro-detail">
      <div class="empty-msg">Select a macro to edit</div>
    </div>

    <div class="panel panel-resizable" id="layer-view">
      <div class="empty-msg">Load a keymap first</div>
    </div>

    <div class="bottom-bar">
      <h3>Changes</h3>
      <div id="diff-preview">
        <div class="diff-empty">No changes</div>
      </div>
      <div class="commit-row">
        <input type="text" id="commit-msg" placeholder="Commit message (optional)">
        <button class="btn-primary" id="btn-commit" disabled>Commit & Push</button>
      </div>
    </div>
  </div>

  <div class="modal" id="key-picker-modal"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
